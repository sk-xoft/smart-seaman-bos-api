spring.profiles.active=development

springdoc.api-docs.path=/smart-seaman-swagger
spring.main.allow-circular-references=true
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER

## DataSource
smart.seaman.datasource.driver=com.mysql.cj.jdbc.Driver

#smart.seaman.datasource.url=jdbc:mysql://127.0.0.1:3306/seaman?autoReconnect=true&useSSL=false&zeroDateTimeBehavior=round
#smart.seaman.datasource.username=root
#smart.seaman.datasource.password=

#### PROD #####
smart.seaman.datasource.url=${SMART_SEAMAN_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/seaman?autoReconnect=true&useSSL=false&zeroDateTimeBehavior=round}
smart.seaman.datasource.username=${SMART_SEAMAN_DATASOURCE_USERNAME:root}
smart.seaman.datasource.password=${SMART_SEAMAN_DATASOURCE_PASSWORD:}

